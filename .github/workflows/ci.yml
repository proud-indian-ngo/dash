name: CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Type check
        run: bun run check:types
      - name: Lint
        run: bun run check
      - name: Unit tests
        run: bun run test:unit

  # TODO: e2e tests disabled — Zero client sync timing causes flaky failures
  # in CI. Each browser context starts a fresh Zero client (IndexedDB not in
  # storageState) and the initial sync takes longer than assertion timeouts on
  # GitHub Actions runners. Re-enable once we have a reliable per-context sync
  # gate (e.g. a Zero ready event or shared IDB snapshot).
  # e2e:
  #   runs-on: ubuntu-latest
  #   needs: [checks]
  e2e-placeholder:
    runs-on: ubuntu-latest
    needs: [checks]
    if: false
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: pi-dash-test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    env:
      TEST_DB_URL: postgres://postgres:test@localhost:5433/pi-dash-test
      DATABASE_URL: postgres://postgres:test@localhost:5433/pi-dash-test
      SKIP_VALIDATION: "true"
      CI: "true"
      TURBO_TELEMETRY_DISABLED: "1"
      BETTER_AUTH_URL: http://localhost:3099
      BETTER_AUTH_SECRET: ci-test-secret-value-at-least-32-chars-long
      CORS_ORIGIN: http://localhost:3099
      ZERO_UPSTREAM_DB: postgres://postgres:test@localhost:5433/pi-dash-test
      ZERO_REPLICA_FILE: /tmp/pi-dash-test.db
      ZERO_MUTATE_URL: http://localhost:3099/api/zero/mutate
      ZERO_QUERY_URL: http://localhost:3099/api/zero/query
      VITE_ZERO_URL: http://localhost:4848
      VITE_CDN_URL: http://localhost:3099
    steps:
      - uses: actions/checkout@v4

      - name: Enable logical replication
        run: |
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -c "ALTER SYSTEM SET wal_level = 'logical';"
          docker restart ${{ job.services.postgres.id }}
          # Wait for postgres to be ready again
          for _ in $(seq 1 30); do
            if pg_isready -h localhost -p 5433 -U postgres 2>/dev/null; then
              echo "postgres ready"
              break
            fi
            sleep 1
          done

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Push schema to test database
        run: cd packages/db && bunx drizzle-kit push

      - name: Seed test users
        run: cd packages/e2e && bun run helpers/seed-test-user.ts

      - name: Build web app
        run: cd apps/web && bun run build

      - name: Start zero-cache
        run: |
          docker run -d --name zero-cache --network host \
            -e ZERO_UPSTREAM_DB="$ZERO_UPSTREAM_DB" \
            -e ZERO_CVR_DB="$ZERO_UPSTREAM_DB" \
            -e ZERO_CHANGE_DB="$ZERO_UPSTREAM_DB" \
            -e ZERO_REPLICA_FILE="$ZERO_REPLICA_FILE" \
            -e ZERO_MUTATE_URL="$ZERO_MUTATE_URL" \
            -e ZERO_QUERY_URL="$ZERO_QUERY_URL" \
            -e ZERO_MUTATE_FORWARD_COOKIES=true \
            -e ZERO_QUERY_FORWARD_COOKIES=true \
            -e ZERO_ADMIN_PASSWORD=ci-test-admin \
            -e ZERO_LOG_LEVEL=info \
            rocicorp/zero:0.25.13
          # Wait for zero-cache to be ready
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:4848/keepalive >/dev/null 2>&1; then
              echo "zero-cache ready"
              exit 0
            fi
            sleep 1
          done
          echo "zero-cache failed to start"
          docker logs zero-cache
          exit 1

      - name: Run Playwright tests
        run: bunx playwright test --config packages/e2e/playwright.config.ts --shard=${{ matrix.shard }}/4

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.shard }}
          path: packages/e2e/playwright-report/
          retention-days: 14
