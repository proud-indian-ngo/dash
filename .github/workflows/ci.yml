name: CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Type check
        run: bun run check:types
      - name: Lint
        run: bun run check
      - name: Unit tests
        run: bun run test:unit

  prepare-shards:
    runs-on: ubuntu-latest
    needs: [checks]
    env:
      TURBO_TELEMETRY_DISABLED: "1"
      SKIP_VALIDATION: "true"
      BASE_URL: "http://localhost:3099"
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Restore test durations cache
        uses: actions/cache/restore@v5
        with:
          path: packages/e2e/.test-durations.json
          key: e2e-durations-${{ github.ref_name }}
          restore-keys: |
            e2e-durations-master
            e2e-durations-
      - name: Generate shard lists
        run: bun run packages/e2e/shard-by-duration.ts 4
      - name: Upload shard lists
        uses: actions/upload-artifact@v7
        with:
          name: shard-lists
          path: packages/e2e/shard-lists/
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    needs: [prepare-shards]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: pi-dash-test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    env:
      TEST_DB_URL: postgres://postgres:test@localhost:5433/pi-dash-test
      DATABASE_URL: postgres://postgres:test@localhost:5433/pi-dash-test
      SKIP_VALIDATION: "true"
      CI: "true"
      TURBO_TELEMETRY_DISABLED: "1"
      BETTER_AUTH_URL: http://localhost:3099
      BETTER_AUTH_SECRET: ci-test-secret-value-at-least-32-chars-long
      CORS_ORIGIN: http://localhost:3099
      ZERO_UPSTREAM_DB: postgres://postgres:test@localhost:5433/pi-dash-test
      ZERO_REPLICA_FILE: /tmp/pi-dash-test.db
      ZERO_MUTATE_URL: http://localhost:3099/api/zero/mutate
      ZERO_QUERY_URL: http://localhost:3099/api/zero/query
      VITE_ZERO_URL: http://localhost:4848
      VITE_CDN_URL: http://localhost:3099
    steps:
      - uses: actions/checkout@v6

      - name: Enable logical replication
        run: |
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -c "ALTER SYSTEM SET wal_level = 'logical';"
          docker restart ${{ job.services.postgres.id }}
          # Wait for postgres to be ready again
          for _ in $(seq 1 30); do
            if pg_isready -h localhost -p 5433 -U postgres 2>/dev/null; then
              echo "postgres ready"
              break
            fi
            sleep 1
          done

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Push schema to test database
        run: cd packages/db && bunx drizzle-kit push

      - name: Seed test users
        run: cd packages/e2e && bun run helpers/seed-test-user.ts

      - name: Build web app
        run: cd apps/web && bun run build

      - name: Start zero-cache
        run: |
          docker run -d --name zero-cache --network host \
            -e ZERO_UPSTREAM_DB="$ZERO_UPSTREAM_DB" \
            -e ZERO_CVR_DB="$ZERO_UPSTREAM_DB" \
            -e ZERO_CHANGE_DB="$ZERO_UPSTREAM_DB" \
            -e ZERO_REPLICA_FILE="$ZERO_REPLICA_FILE" \
            -e ZERO_MUTATE_URL="$ZERO_MUTATE_URL" \
            -e ZERO_QUERY_URL="$ZERO_QUERY_URL" \
            -e ZERO_MUTATE_FORWARD_COOKIES=true \
            -e ZERO_QUERY_FORWARD_COOKIES=true \
            -e ZERO_ADMIN_PASSWORD=ci-test-admin \
            -e ZERO_LOG_LEVEL=info \
            rocicorp/zero:1.1.1
          # Wait for zero-cache to be ready (use root path, not /keepalive)
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:4848/ >/dev/null 2>&1; then
              echo "zero-cache ready"
              exit 0
            fi
            sleep 1
          done
          echo "zero-cache failed to start"
          docker logs zero-cache
          exit 1

      - name: Download shard lists
        uses: actions/download-artifact@v7
        with:
          name: shard-lists
          path: packages/e2e/shard-lists/

      - name: Run Playwright tests
        run: bunx playwright test --config packages/e2e/playwright.config.ts --test-list=packages/e2e/shard-lists/shard-${{ matrix.shard }}.txt

      - name: Upload test durations
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-durations-${{ matrix.shard }}
          path: packages/e2e/.test-durations.json
          include-hidden-files: true
          retention-days: 1

      - name: Zero-cache logs
        if: failure()
        run: |
          echo "=== zero-cache container status ==="
          docker inspect zero-cache --format 'status={{.State.Status}} exit={{.State.ExitCode}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' 2>/dev/null || echo "container not found"
          echo "=== zero-cache logs (last 100 lines) ==="
          docker logs --tail 100 zero-cache 2>&1 || echo "no logs available"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.shard }}
          path: packages/e2e/playwright-report/
          retention-days: 14

  e2e-status:
    if: always()
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Check E2E results
        run: |
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "E2E tests failed (result: ${{ needs.e2e.result }})"
            exit 1
          fi
      - name: Download all duration artifacts
        if: needs.e2e.result == 'success'
        uses: actions/download-artifact@v7
        with:
          pattern: test-durations-*
          path: /tmp/durations
      - name: Merge and cache durations
        if: needs.e2e.result == 'success'
        run: |
          # Merge all shard duration files into one
          echo '{}' > /tmp/merged-durations.json
          for f in /tmp/durations/*/; do
            if [ -f "${f}.test-durations.json" ]; then
              # Merge using jq-like approach with node
              node -e "
                const a = JSON.parse(require('fs').readFileSync('/tmp/merged-durations.json', 'utf8'));
                const b = JSON.parse(require('fs').readFileSync('${f}.test-durations.json', 'utf8'));
                Object.assign(a, b);
                require('fs').writeFileSync('/tmp/merged-durations.json', JSON.stringify(a, null, 2));
              "
            fi
          done
          echo "Merged durations: $(node -e "console.log(Object.keys(JSON.parse(require('fs').readFileSync('/tmp/merged-durations.json','utf8'))).length)") tests"
          mkdir -p packages/e2e
          cp /tmp/merged-durations.json packages/e2e/.test-durations.json
      - name: Save durations cache
        if: needs.e2e.result == 'success'
        uses: actions/cache/save@v5
        with:
          path: packages/e2e/.test-durations.json
          key: e2e-durations-${{ github.ref_name }}-${{ github.run_id }}
