# Ruler Configuration File
# See https://okigu.com/ruler for documentation.

# Default agents to run when --agents is not specified
default_agents = ["agentsmd", "claude", "opencode", "zed", "codex"]

# --- Global MCP Server Configuration ---
[mcp]
# Enable/disable MCP propagation globally (default: true)
enabled = true
# Global merge strategy: 'merge' or 'overwrite' (default: 'merge')
merge_strategy = "overwrite"

# --- MCP Server Definitions ---
[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp", "--api-key", "${CONTEXT7_API_KEY}"]

[mcp_servers.jina-mcp-server]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.jina.ai/v1", "--header", "Authorization: Bearer ${JINA_API_KEY}"]

[mcp_servers.courier]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.courier.com", "--header", "api_key: ${COURIER_API_KEY}"]

[mcp_servers.grepai]
command = "grepai"
args = ["mcp-serve"]

[mcp_servers.hugeicons]
command = "npx"
args = ["-y", "@hugeicons/mcp-server"]

# --- Global .gitignore Configuration ---
[gitignore]
# Enable/disable automatic .gitignore updates (default: true)
enabled = true
