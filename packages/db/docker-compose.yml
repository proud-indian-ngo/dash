name: pi-dash

services:
  postgres:
    image: postgres:17
    container_name: pi-dash-postgres
    environment:
      POSTGRES_DB: pi-dash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DEV_DB_PASSWORD}
    command: postgres -c wal_level=logical
    ports:
      - "5432:5432"
    volumes:
      - pi-dash_postgres_data:/var/lib/postgresql
      - ./packages/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-test:
    image: postgres:17
    container_name: pi-dash-postgres-test
    environment:
      POSTGRES_DB: pi-dash-test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DEV_DB_PASSWORD}
    command: postgres -c wal_level=logical
    ports:
      - "5433:5432"
    volumes:
      - pi-dash_postgres_test_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-migration:
    image: postgres:17
    container_name: pi-dash-postgres-migration
    environment:
      POSTGRES_DB: pi-dash-migration
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DEV_DB_PASSWORD}
    command: postgres -c wal_level=logical
    ports:
      - "5434:5432"
    volumes:
      - pi-dash_postgres_migration_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  whatsapp:
    image: aldinokemal2104/go-whatsapp-web-multidevice
    container_name: pi-dash-whatsapp
    ports:
      - "3100:3000"
    volumes:
      - pi-dash_whatsapp_data:/app/storages
    command:
      - rest
      - --basic-auth=${WHATSAPP_AUTH_USER:-admin}:${WHATSAPP_AUTH_PASS:-admin}
      - --port=3000
    restart: unless-stopped

volumes:
  pi-dash_postgres_data:
  pi-dash_postgres_test_data:
  pi-dash_postgres_migration_data:
  pi-dash_whatsapp_data:
