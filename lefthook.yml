pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: "*.{ts,tsx}"
      run: bun run check:types

    fix:
      glob: "*.{js,ts,jsx,tsx}"
      run: bunx ultracite fix {staged_files}
      stage_fixed: true

    test:
      glob: "*.{ts,tsx}"
      run: bun run test:unit

    unused:
      glob: "*.{ts,tsx}"
      run: bun run check:unused

pre-push:
  commands:
    build:
      # Populate Turbo remote cache so CI build hits cache.
      # Only runs when app/package code changes; doc/config-only pushes skip.
      glob: "{apps,packages}/**/*.{ts,tsx,js,jsx,json,css,html}"
      env:
        TURBO_TELEMETRY_DISABLED: "1"
        TURBO_API: "https://turbo.ducktors.dev"
        TURBO_TOKEN: "turbotokenoss"
        TURBO_TEAM: "pi-dash"
        SKIP_VALIDATION: "true"
        BETTER_AUTH_URL: "http://localhost:3001"
        BETTER_AUTH_SECRET: "local-prepush-build-secret-at-least-32-chars"
        CORS_ORIGIN: "http://localhost:3001"
        VITE_ZERO_URL: "http://localhost:4848"
        VITE_CDN_URL: "http://localhost:3001"
      run: bun run build

post-checkout:
  commands:
    worktree-bootstrap:
      run: |
        MAIN_DIR=$(git worktree list --porcelain | head -1 | sed 's/worktree //')
        CURRENT_DIR=$(git rev-parse --show-toplevel)
        if [ "$MAIN_DIR" != "$CURRENT_DIR" ]; then
          if [ ! -f .env ]; then
            cp "$MAIN_DIR/.env" .env 2>/dev/null || true
            echo "Copied .env from main worktree"
          fi
          if [ ! -f CLAUDE.md ] || [ .ruler/agent-guide.md -nt CLAUDE.md ]; then
            bun run ruler:apply 2>/dev/null || true
          fi
        fi
