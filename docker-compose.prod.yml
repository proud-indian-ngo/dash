name: pi-dash

x-db-url: &db-url postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@tailscale-postgres:5432/${POSTGRES_DB:-pi-dash}

services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      TZ: Asia/Kolkata
      DATABASE_URL: *db-url
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_ZERO_URL: ${VITE_ZERO_URL}
        VITE_CDN_URL: ${VITE_CDN_URL}
        VITE_IMMICH_URL: ${VITE_IMMICH_URL:-}
    ports:
      - 3000
    environment:
      DATABASE_URL: *db-url
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      VITE_ZERO_URL: ${VITE_ZERO_URL}
      GRAVATAR_API_KEY: ${GRAVATAR_API_KEY:-}
      AVATAR_FALLBACK_SEED: ${AVATAR_FALLBACK_SEED:-}
      GRAVATAR_API_BASE_URL: ${GRAVATAR_API_BASE_URL:-https://api.gravatar.com/v3}
      GRAVATAR_TIMEOUT_MS: ${GRAVATAR_TIMEOUT_MS:-5000}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_KEY_PREFIX: ${R2_KEY_PREFIX:-}
      VITE_CDN_URL: ${VITE_CDN_URL:-}
      COURIER_API_KEY: ${COURIER_API_KEY:-}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-http://tailscale-gowa:3000}
      WHATSAPP_AUTH_USER: ${WHATSAPP_AUTH_USER:-}
      WHATSAPP_AUTH_PASS: ${WHATSAPP_AUTH_PASS:-}
      APP_URL: ${APP_URL:-}
      IMMICH_API_KEY: ${IMMICH_API_KEY:-}
      VITE_IMMICH_URL: ${VITE_IMMICH_URL:-}
      TZ: Asia/Kolkata
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      zero-cache:
        condition: service_healthy
    restart: unless-stopped

  gowa:
    image: aldinokemal2104/go-whatsapp-web-multidevice
    volumes:
      - whatsapp_data:/app/storages
    command:
      - rest
      - --basic-auth=${WHATSAPP_AUTH_USER:-admin}:${WHATSAPP_AUTH_PASS:-admin}
      - --port=3000
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000 || [ $? -eq 8 ]"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - tailscale-gowa
    network_mode: service:tailscale-gowa
    restart: unless-stopped

  tailscale-gowa:
    image: tailscale/tailscale:v1.96.5
    hostname: gowa
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_EXTRA_ARGS: --advertise-tags=tag:container,tag:internal-app
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/tailscale/gowa.json
      TS_USERSPACE: "true"
    volumes:
      - tailscale_gowa_data:/var/lib/tailscale
      - ${TAILSCALE_CONFIG_DIR:-/root/.config}:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      TZ: Asia/Kolkata
      POSTGRES_DB: ${POSTGRES_DB:-pi-dash}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: postgres -c wal_level=logical
    volumes:
      - postgres_data:/var/lib/postgresql/data
    depends_on:
      - tailscale-postgres
    network_mode: service:tailscale-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tailscale-postgres:
    image: tailscale/tailscale:v1.96.5
    hostname: pi-dash-db
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_EXTRA_ARGS: --advertise-tags=tag:container,tag:internal-app
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
    volumes:
      - tailscale_postgres_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

  zero-cache:
    image: rocicorp/zero:1.2.0
    ports:
      - 4848
    environment:
      TZ: Asia/Kolkata
      ZERO_UPSTREAM_DB: *db-url
      ZERO_CVR_DB: *db-url
      ZERO_CHANGE_DB: *db-url
      ZERO_REPLICA_FILE: /data/zero.db
      ZERO_ADMIN_PASSWORD: ${ZERO_ADMIN_PASSWORD:-}
      ZERO_MUTATE_FORWARD_COOKIES: "true"
      ZERO_MUTATE_URL: http://web:${PORT:-3000}/api/zero/mutate
      ZERO_QUERY_FORWARD_COOKIES: "true"
      ZERO_QUERY_URL: http://web:${PORT:-3000}/api/zero/query
      ZERO_LOG_LEVEL: ${ZERO_LOG_LEVEL:-info}
    volumes:
      - zero_cache_data:/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4848/keepalive"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  zero_cache_data:
  whatsapp_data:
  tailscale_gowa_data:
  tailscale_postgres_data:
